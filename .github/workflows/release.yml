name: Build installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.3). No release will be created; the installer is uploaded as a workflow artifact.'
        required: true

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull build files from release branch
        shell: pwsh
        run: |
          git fetch origin release
          git checkout origin/release -- ClariFi.spec ClariFi.iss launcher.py clarifi.ico

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install flask openpyxl pyinstaller pywebview pillow pillow-heif pypdf pg8000 scramp asn1crypto

      - name: Build PyInstaller bundle
        run: pyinstaller --noconfirm ClariFi.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          # Version comes from the #define MyAppVersion in ClariFi.iss (kept in sync
          # with APP_VERSION on every release; see CLAUDE.md rule 14).
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ClariFi.iss

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/ClariFi-Setup-*.exe
          fail_on_unmatched_files: true

      - name: Upload installer as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ClariFi-Setup-${{ steps.ver.outputs.version }}
          path: Output/ClariFi-Setup-*.exe

  # Linux .deb. Thin package, mirroring how the Windows build relies on the
  # system WebView2: it does NOT bundle Python or the web engine. Instead it
  # ships the app source plus a small vendored set of pip-only pure-Python deps
  # (pywebview, pypdf), and declares everything else (Python, GTK/WebKitGTK,
  # Flask, Pillow, openpyxl) as apt Depends so `apt install` pulls them. Keeps
  # the .deb at a few MB. Runs after the Windows job so both attach to the same
  # release without racing to create it.
  release-linux:
    needs: release-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull build files from release branch
        run: |
          git fetch origin release
          git checkout origin/release -- launcher.py run.sh clarifi.ico clarifi.desktop build-deb.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Vendor pip-only pure-Python deps
        run: pip install --target vendor pywebview pypdf

      - name: Generate PNG icon from clarifi.ico
        run: pip install pillow && python -c "from PIL import Image; Image.open('clarifi.ico').resize((256,256)).convert('RGBA').save('clarifi.png')"

      - name: Build .deb package
        run: bash build-deb.sh "${{ steps.ver.outputs.version }}"

      - name: Attach .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/clarifi_*_amd64.deb
          fail_on_unmatched_files: true

      - name: Upload .deb as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: clarifi_${{ steps.ver.outputs.version }}_amd64
          path: dist/clarifi_*_amd64.deb
