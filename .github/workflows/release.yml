name: Build Windows installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.3). No release will be created; the installer is uploaded as a workflow artifact.'
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull build files from build branch
        shell: pwsh
        run: |
          git fetch origin build
          git checkout origin/build -- ClariFi.spec ClariFi.iss launcher.py clarifi.ico

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install flask openpyxl pyinstaller pywebview pytesseract pillow pillow-heif pypdf

      - name: Install Tesseract OCR
        run: choco install tesseract -y --no-progress

      - name: Build PyInstaller bundle
        run: pyinstaller --noconfirm ClariFi.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" ClariFi.iss

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/ClariFi-Setup-*.exe
          fail_on_unmatched_files: true

      - name: Upload installer as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ClariFi-Setup-${{ steps.ver.outputs.version }}
          path: Output/ClariFi-Setup-*.exe
